name: release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build:
    name: build and inspect the package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # hatch-vcs derives the version from the release tag and history.
          fetch-depth: 0
      - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18.0

  publish:
    name: upload release to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    if: github.repository_owner == 'jessegrabowski' && github.event_name == 'release' && github.event.action == 'published'
    # Use the `release` GitHub environment to protect Trusted Publishing (OIDC)
    # by requiring sign-off from a maintainer.
    environment: release
    permissions:
      # Required for PyPI trusted publishing (OIDC); no API token needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # build-and-inspect-python-package uploads the dists under this name.
          name: Packages
          path: dist
      - uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d # v1.14.0
